name: Pipeline 1 - Infra - Create SageMaker Studio

on:
  workflow_dispatch:

jobs:
  cdk-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cdk/requirements.txt
          pip install boto3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap
        run: |
          cd cdk
          cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }} || true

      - name: Wait for Previous Stack Operation to Complete
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python - <<'EOF'
          import boto3
          import os

          region = os.environ.get("AWS_REGION", "us-east-1")
          cf     = boto3.client("cloudformation", region_name=region)

          try:
              response = cf.describe_stacks(StackName="AdultIncomeSageMakerStack")
              status   = response["Stacks"][0]["StackStatus"]
              print(f"Stack status: {status}")

              if "DELETE_IN_PROGRESS" in status:
                  print("⏳ Stack deletion in progress — waiting...")
                  waiter = cf.get_waiter("stack_delete_complete")
                  waiter.wait(
                      StackName="AdultIncomeSageMakerStack",
                      WaiterConfig={"Delay": 15, "MaxAttempts": 60}
                  )
                  print("✅ Stack deleted — ready for fresh deploy")

              elif status in ["ROLLBACK_COMPLETE", "ROLLBACK_FAILED",
                              "CREATE_FAILED", "DELETE_FAILED"]:
                  print(f"⏳ Stack in {status} — deleting before redeploy...")
                  cf.delete_stack(StackName="AdultIncomeSageMakerStack")
                  waiter = cf.get_waiter("stack_delete_complete")
                  waiter.wait(
                      StackName="AdultIncomeSageMakerStack",
                      WaiterConfig={"Delay": 15, "MaxAttempts": 60}
                  )
                  print("✅ Stack deleted — ready for fresh deploy")

              else:
                  print(f"✅ Stack in {status} — proceeding with deploy")

          except cf.exceptions.ClientError as e:
              if "does not exist" in str(e):
                  print("✅ No existing stack — fresh deploy")
              else:
                  raise
          EOF

      - name: CDK Diff
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cd cdk
          cdk diff AdultIncomeSageMakerStack || true

      - name: CDK Deploy
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cd cdk
          cdk deploy AdultIncomeSageMakerStack \
            --require-approval never \
            --outputs-file ../cdk_outputs.json

      - name: Save CDK Outputs to S3
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          python cdk/save_outputs.py

      - name: Show Infra Outputs
        run: |
          echo "✅ CDK Stack Outputs:"
          cat cdk_outputs.json
          echo "✅ Saved to S3:"
          cat infra_outputs.json